<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #080611; }
      @font-face { font-family: "DevaHF";
        src: local("Kohinoor Devanagari"), local("Devanagari Sangam MN"), local("Noto Sans Devanagari");
        font-weight: 100 900; }
      body { font-family: "DevaHF", -apple-system, "Helvetica Neue", Arial, sans-serif; }
      .scene { position: absolute; inset: 0; }
      .content { position: absolute; inset: 0; overflow: hidden; }
      /* cinematic vignette on every poster */
      .vig { position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(4,2,10,0.72) 100%); }
      .pbg { position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; filter: blur(42px) brightness(0.45); transform: scale(1.2); }
      .poster { position: absolute; left: 50%; top: 50%; width: 1000px;
        border-radius: 34px; box-shadow: 0 40px 110px rgba(0,0,0,0.65); }

      /* ---------- INTRO ---------- */
      .intro-bg { position: absolute; inset: 0;
        background: radial-gradient(90% 60% at 50% 42%, #2c1e52 0%, #150e2c 46%, #070510 100%); }
      .glow { position: absolute; left: 50%; top: 620px; width: 900px; height: 900px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(255,196,110,0.42) 0%, rgba(255,196,110,0) 62%); }
      .intro-om { position: absolute; top: 470px; left: 0; width: 100%; text-align: center;
        color: #ffdf9a; font-size: 300px; line-height: 1; text-shadow: 0 0 60px rgba(255,196,110,0.6); }
      .intro-title { position: absolute; top: 1010px; left: 0; width: 100%; text-align: center;
        color: #fff; font-weight: 800; font-size: 96px; letter-spacing: -0.5px;
        text-shadow: 0 6px 30px rgba(0,0,0,0.5); }
      .intro-sub { position: absolute; top: 1180px; left: 0; width: 100%; text-align: center;
        color: #ffcf7a; font-weight: 700; font-size: 52px; }

      /* ---------- CTA ---------- */
      .ec-bg { position: absolute; inset: 0;
        background: radial-gradient(120% 80% at 50% 26%, #2a1c4d 0%, #170f30 48%, #080611 100%); }
      .ec-om { position: absolute; top: 320px; left: 0; width: 100%; text-align: center;
        color: #ffdf9a; font-size: 150px; line-height: 1; text-shadow: 0 0 50px rgba(255,196,110,0.5); }
      .ec-small { position: absolute; top: 580px; left: 0; width: 100%; text-align: center;
        color: #ffdf9a; font-weight: 700; font-size: 58px; }
      .ec-title { position: absolute; top: 656px; left: 0; width: 100%; text-align: center;
        color: #fff; font-weight: 800; font-size: 130px; letter-spacing: -1px;
        text-shadow: 0 6px 30px rgba(0,0,0,0.5); }
      .ec-sub { position: absolute; top: 880px; left: 0; width: 100%; text-align: center;
        color: #f2e9dd; font-weight: 600; font-size: 50px; }
      .ec-free { position: absolute; top: 972px; left: 0; width: 100%; text-align: center;
        color: #ff9d3c; font-weight: 800; font-size: 64px; }
      .ec-badge { position: absolute; top: 1150px; left: 250px; width: 580px;
        border: 3px solid #ffffff; border-radius: 22px; padding: 26px 0;
        color: #fff; font-weight: 700; font-size: 46px; text-align: center;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
      .ec-handle { position: absolute; top: 1360px; left: 0; width: 100%; text-align: center;
        color: #c9b6ff; font-weight: 700; font-size: 44px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="18.2"
         data-width="1080" data-height="1920">

      <!-- INTRO -->
      <div class="clip scene" id="intro" data-start="0" data-duration="3" data-track-index="0">
        <div class="content">
          <div class="intro-bg"></div>
          <div class="glow"></div>
          <div class="intro-om">ॐ</div>
          <div class="intro-title">सावन आने वाला है</div>
          <div class="intro-sub">🔱 30 जुलाई से · बोल बम</div>
        </div>
      </div>

      <!-- POSTERS -->
      <div class="clip scene" id="p1" data-start="2.5" data-duration="3.4" data-track-index="1">
        <div class="content"><img class="pbg" src="media/p1.png" /><img class="poster" src="media/p1.png" /><div class="vig"></div></div>
      </div>
      <div class="clip scene" id="p2" data-start="5.4" data-duration="3.4" data-track-index="0">
        <div class="content"><img class="pbg" src="media/p2.png" /><img class="poster" src="media/p2.png" /><div class="vig"></div></div>
      </div>
      <div class="clip scene" id="p3" data-start="8.3" data-duration="3.4" data-track-index="1">
        <div class="content"><img class="pbg" src="media/p3.png" /><img class="poster" src="media/p3.png" /><div class="vig"></div></div>
      </div>
      <div class="clip scene" id="p4" data-start="11.2" data-duration="3.4" data-track-index="0">
        <div class="content"><img class="pbg" src="media/p4.png" /><img class="poster" src="media/p4.png" /><div class="vig"></div></div>
      </div>

      <!-- CTA -->
      <div class="clip scene" id="cta" data-start="13.9" data-duration="4.3" data-track-index="1">
        <div class="content">
          <div class="ec-bg"></div>
          <div class="ec-om">ॐ</div>
          <div class="ec-small">अपने नाम का</div>
          <div class="ec-title">शिव पोस्टर</div>
          <div class="ec-sub">2 tap में बनाओ · WhatsApp पे शेयर</div>
          <div class="ec-free">बिलकुल Free</div>
          <div class="ec-badge">▶  Get it on Google Play</div>
          <div class="ec-handle">@shareposter.app · हर हर महादेव</div>
        </div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* ---- INTRO ---- */
      tl.fromTo("#intro .content", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.fromTo("#intro .glow", { scale: 0.6, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.2, ease: "power2.out" }, 0.1);
      tl.to("#intro .glow", { scale: 1.12, duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 1.4);
      tl.fromTo("#intro .intro-om", { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.0, ease: "back.out(1.5)" }, 0.15);
      tl.fromTo("#intro .intro-title", { y: 50, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: "power3.out" }, 0.7);
      tl.fromTo("#intro .intro-sub", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 1.0);
      tl.to("#intro .content", { opacity: 0, scale: 1.08, duration: 0.5, ease: "power2.in", transformOrigin: "50% 50%" }, 2.5);

      /* ---- POSTER helper: varied ken-burns ---- */
      // dir: "in" | "up" | "down"
      function poster(sel, tIn, tOut, dir) {
        tl.fromTo(sel + " .content", { opacity: 0 }, { opacity: 1, duration: 0.55, ease: "power2.out" }, tIn);
        var from = { scale: 1.0, xPercent: -50, yPercent: -50 };
        var to = { scale: 1.07, xPercent: -50, yPercent: -50, duration: 3.7, ease: "none" };
        if (dir === "up")   { from.scale = 1.06; from.yPercent = -46; to.scale = 1.06; to.yPercent = -54; }
        if (dir === "down") { from.scale = 1.06; from.yPercent = -54; to.scale = 1.06; to.yPercent = -46; }
        tl.fromTo(sel + " .poster", from, to, tIn);
        tl.fromTo(sel + " .pbg", { scale: 1.2 }, { scale: 1.28, duration: 3.7, ease: "none" }, tIn);
        if (tOut !== null) tl.to(sel + " .content", { opacity: 0, duration: 0.55, ease: "power2.in" }, tOut);
      }
      poster("#p1", 2.5, 5.4, "in");
      poster("#p2", 5.4, 8.3, "up");
      poster("#p3", 8.3, 11.2, "down");
      // p4 does a zoom-through into the CTA (scale up + fade)
      tl.fromTo("#p4 .content", { opacity: 0 }, { opacity: 1, duration: 0.55, ease: "power2.out" }, 11.2);
      tl.fromTo("#p4 .poster", { scale: 1.0, xPercent: -50, yPercent: -50 }, { scale: 1.1, xPercent: -50, yPercent: -50, duration: 2.7, ease: "power1.in" }, 11.2);
      tl.fromTo("#p4 .pbg", { scale: 1.2 }, { scale: 1.3, duration: 2.7, ease: "none" }, 11.2);
      tl.to("#p4 .content", { opacity: 0, scale: 1.25, duration: 0.6, ease: "power2.in", transformOrigin: "50% 46%" }, 13.9);

      /* ---- CTA ---- */
      tl.fromTo("#cta .content", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 13.9);
      tl.fromTo("#cta .ec-om", { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.9, ease: "back.out(1.5)" }, 14.1);
      tl.to("#cta .ec-om", { scale: 1.08, duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 2, transformOrigin: "50% 50%" }, 15.0);
      tl.fromTo("#cta .ec-small", { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 14.4);
      tl.fromTo("#cta .ec-title", { scale: 0.85, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.8, ease: "back.out(1.4)" }, 14.5);
      tl.fromTo("#cta .ec-sub", { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 14.85);
      tl.fromTo("#cta .ec-free", { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 15.05);
      tl.fromTo("#cta .ec-badge", { scale: 0.9, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.6)" }, 15.3);
      tl.fromTo("#cta .ec-handle", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out" }, 15.6);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
